name: Deploy Backend to Azure Container App

on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-aca
  cancel-in-progress: false # Never cancel an in-progress deployment

jobs:
  deploy:
    name: Deploy to ACA
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    environment: production
    env:
      # Must match the SENTRY_RELEASE set in the docker workflow (same SHA)
      SENTRY_RELEASE: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Lowercase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Update Azure Container App
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name valora-backend \
              --resource-group rg-valora \
              --image ghcr.io/${{ env.REPO }}:sha-${{ github.event.workflow_run.head_sha }}

      - name: Verify deployment health
        run: |
          echo "⏳ Waiting for deployment to stabilise..."
          sleep 30

          FQDN=$(az containerapp show \
            --name valora-backend \
            --resource-group rg-valora \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "🔍 Health-checking https://$FQDN/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/api/health" --max-time 15 || true)

          if [[ "$STATUS" == "200" ]]; then
            echo "✅ Deployment healthy (HTTP $STATUS)"
          else
            echo "⚠️ Health check returned HTTP $STATUS — investigate manually."
            exit 1
          fi

      # ── Finalise Sentry Release ─────────────────────────────────────────
      # Mark the release as deployed to production *after* the health check
      # passes. This tells Sentry the exact moment production went live.
      - name: Finalise Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_BACKEND }}
        with:
          environment: production
          version: ${{ env.SENTRY_RELEASE }}
          finalize: true
          # Don't re-associate commits — already done in the docker workflow
          set_commits: skip
